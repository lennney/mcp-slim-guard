# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      configPath:
        type: string
        description: "Path to mcp-slim-guard.yml (default: ./mcp-slim-guard.yml). Run 'mcp-slim-guard init' to generate one."
  commandFunction:
    - npx
    - -y
    - mcp-slim-guard
    - start
